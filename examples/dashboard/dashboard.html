<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ActTrace Dashboard</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── Header ── */
    header {
      display: flex;
      align-items: center;
      gap: 1rem;
      padding: 0.75rem 1.5rem;
      background: #1e293b;
      border-bottom: 1px solid #334155;
      flex-shrink: 0;
    }
    header h1 { font-size: 1rem; font-weight: 700; color: #f1f5f9; flex: 1; }
    header h1 span { color: #3b82f6; }

    .status {
      display: flex;
      align-items: center;
      gap: 0.4rem;
      font-size: 0.78rem;
      color: #94a3b8;
    }
    #status-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: #10b981;
      flex-shrink: 0;
    }

    .demo-link {
      font-size: 0.78rem;
      color: #3b82f6;
      text-decoration: none;
      padding: 0.3rem 0.7rem;
      border: 1px solid #3b82f6;
      border-radius: 4px;
    }
    .demo-link:hover { background: #1d4ed833; }

    button#btn-clear {
      font-size: 0.78rem;
      padding: 0.3rem 0.7rem;
      border: 1px solid #475569;
      border-radius: 4px;
      background: transparent;
      color: #94a3b8;
      cursor: pointer;
    }
    button#btn-clear:hover { background: #1e293b; color: #e2e8f0; }

    /* ── Stats bar ── */
    .stats {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 1px;
      background: #1e293b;
      border-bottom: 1px solid #334155;
      flex-shrink: 0;
    }
    .stat {
      padding: 0.6rem 1.5rem;
      background: #0f172a;
    }
    .stat-value {
      font-size: 1.4rem;
      font-weight: 700;
      color: #f1f5f9;
      line-height: 1;
    }
    .stat-label {
      font-size: 0.7rem;
      color: #64748b;
      text-transform: uppercase;
      letter-spacing: 0.07em;
      margin-top: 0.2rem;
    }

    /* ── Trace list ── */
    main {
      flex: 1;
      overflow-y: auto;
      padding: 1rem 1.5rem;
    }

    .empty-state {
      color: #475569;
      font-size: 0.88rem;
      text-align: center;
      margin-top: 3rem;
    }

    .trace-card {
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 8px;
      padding: 0.75rem 1rem;
      margin-bottom: 0.6rem;
      animation: slide-in 0.15s ease-out;
    }

    @keyframes slide-in {
      from { opacity: 0; transform: translateY(-6px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .card-header {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      margin-bottom: 0.35rem;
    }

    .event-badge {
      font-size: 0.68rem;
      font-weight: 700;
      padding: 0.15rem 0.45rem;
      border-radius: 3px;
      color: #fff;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      flex-shrink: 0;
    }

    .act-name {
      font-size: 0.9rem;
      font-weight: 600;
      color: #f1f5f9;
    }

    .boundary {
      font-size: 0.72rem;
      color: #64748b;
      background: #0f172a;
      border: 1px solid #334155;
      padding: 0.1rem 0.4rem;
      border-radius: 3px;
    }

    .trace-time {
      margin-left: auto;
      font-size: 0.72rem;
      color: #475569;
      font-variant-numeric: tabular-nums;
    }

    .trace-target {
      font-size: 0.78rem;
      color: #64748b;
      font-family: 'SF Mono', 'Fira Code', monospace;
      margin-bottom: 0.4rem;
    }

    .trace-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
      font-size: 0.75rem;
    }

    .meta-item {
      color: #94a3b8;
    }

    .meta-group {
      display: flex;
      flex-wrap: wrap;
      gap: 0.35rem;
      align-items: center;
      color: #94a3b8;
    }

    .net-call {
      font-family: 'SF Mono', 'Fira Code', monospace;
      background: #0f172a;
      padding: 0.1rem 0.4rem;
      border-radius: 3px;
      font-size: 0.72rem;
      color: #38bdf8;
    }

    .net-error {
      color: #f87171;
    }
  </style>
</head>
<body>
  <header>
    <h1>Act<span>Trace</span> Dashboard</h1>
    <div class="status">
      <span id="status-dot"></span>
      <span id="status-text">Connecting…</span>
    </div>
    <a href="/" class="demo-link">← Demo page</a>
    <button id="btn-clear">Clear</button>
  </header>

  <div class="stats">
    <div class="stat">
      <div class="stat-value" id="stat-total">0</div>
      <div class="stat-label">Traces</div>
    </div>
    <div class="stat">
      <div class="stat-value" id="stat-avg">—</div>
      <div class="stat-label">Avg duration</div>
    </div>
    <div class="stat">
      <div class="stat-value" id="stat-network">0</div>
      <div class="stat-label">Network calls</div>
    </div>
    <div class="stat">
      <div class="stat-value" id="stat-mutations">0</div>
      <div class="stat-label">DOM mutations</div>
    </div>
  </div>

  <main>
    <div id="trace-list">
      <p class="empty-state">Interact with the demo page to see traces appear here.</p>
    </div>
  </main>

  <script type="module" src="/src/dashboard.ts"></script>
</body>
</html>
