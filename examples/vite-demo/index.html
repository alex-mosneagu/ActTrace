<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ActTrace Demo</title>
  <style>
    body { font-family: system-ui, sans-serif; max-width: 620px; margin: 2rem auto; padding: 0 1rem; color: #1a1a1a; }
    h1 { font-size: 1.5rem; margin-bottom: 0.25rem; }
    p.hint { color: #666; margin-top: 0; font-size: 0.9rem; }
    section, form { border: 1px solid #ddd; padding: 1rem 1.25rem; margin: 1rem 0; border-radius: 8px; background: #fafafa; }
    h2 { margin-top: 0; font-size: 0.85rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; color: #888; }
    input { display: block; margin: 0.5rem 0; padding: 0.4rem 0.6rem; width: 100%; box-sizing: border-box; border: 1px solid #ccc; border-radius: 4px; font-size: 0.95rem; }
    button { padding: 0.45rem 1rem; margin-top: 0.5rem; cursor: pointer; border: 1px solid #999; border-radius: 4px; background: #fff; font-size: 0.9rem; }
    button:hover { background: #f0f0f0; }
    ul { margin: 0.75rem 0 0; padding-left: 1.25rem; }
    li { margin: 0.25rem 0; font-size: 0.9rem; }
  </style>
</head>
<body>
  <h1>ActTrace Demo</h1>
  <p class="hint">Open the browser console to see traces appear as you interact.</p>

  <section data-act-boundary="CustomerModule">
    <h2>Customer Module</h2>
    <input placeholder="Customer name" />
    <input type="password" placeholder="Password (sensitive — will not appear in trace)" />
    <button data-act="customer.save">Save Customer</button>
    <ul id="customer-list"></ul>
  </section>

  <section data-act-boundary="SearchModule">
    <h2>Search Module</h2>
    <input data-act="search.query" placeholder="Search..." />
  </section>

  <form data-act-boundary="LoginForm">
    <h2>Login Form</h2>
    <input type="text" name="username" placeholder="Username" />
    <input type="password" name="password" placeholder="Password (sensitive)" />
    <button type="submit" data-act="auth.login">Login</button>
  </form>

  <script type="module" src="/src/main.ts"></script>
</body>
</html>
